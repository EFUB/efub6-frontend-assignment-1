<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Todo 리스트</title>
    <style>
        body {
            background-color: #007bff; 
            color: white;             
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        .todo-container {
            width: 400px;
            text-align: center; 
        }

        h1 {
            font-size: 3.5rem;   
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        #addBtn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background-color: #ffffff;
            color: #007bff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #addBtn:hover {
            background-color: #e0e0e0;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        li.completed span {
            text-decoration: line-through;
            opacity: 0.6;
        }

        li span {
            flex: 1;
            text-align: left;
            cursor: pointer;
        }

        .btn-group button {
            margin-left: 5px;
            background: none;
            border: 1px solid white;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px 8px;
        }

        .btn-group button:hover {
            background: white;
            color: #007bff;
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h1>To-Do List</h1>
        
        <div class="input-group">
            <input type="text" id="todoInput" placeholder="오늘 뭐 할까?">
            <button id="addBtn">추가</button>
        </div>

        <ul id="todoList"></ul>
    </div>

    <script>
        const todoInput = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');

        let todos = JSON.parse(localStorage.getItem('my_todos')) || [];


        function render() {
            todoList.innerHTML = '';
            
            todos.forEach((todo, index) => {
                const li = document.createElement('li');
                if (todo.completed) li.classList.add('completed');

                li.innerHTML = `
                    <span onclick="toggleTodo(${index})">${todo.text}</span>
                    <div class="btn-group">
                        <button onclick="editTodo(${index})">수정</button>
                        <button onclick="deleteTodo(${index})">삭제</button>
                    </div>
                `;
                todoList.appendChild(li);
            });

            localStorage.setItem('my_todos', JSON.stringify(todos));
        }

        function addTodo() {
            const text = todoInput.value.trim();
            if (text !== '') {
                todos.push({ text: text, completed: false });
                todoInput.value = '';
                render();
            }
        }

        function deleteTodo(index) {
            if(confirm("정말 삭제할까요?")) {
                todos.splice(index, 1);
                render();
            }
        }

        function toggleTodo(index) {
            todos[index].completed = !todos[index].completed;
            render();
        }

        function editTodo(index) {
            const newText = prompt('수정할 내용을 입력하세요:', todos[index].text);
            if (newText !== null && newText.trim() !== '') {
                todos[index].text = newText.trim();
                render();
            }
        }

        addBtn.addEventListener('click', addTodo);
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });


        render();
    </script>
</body>
</html>
